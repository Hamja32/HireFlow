# Server Port (Railway automatically PORT allocate karta hai)
server.port=${PORT:8080}

# MySQL Database Configuration (Railway ke variables)
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=HireFlow2024SecretKeyForJWTTokenGeneration
jwt.expiration=86400000

file.upload-dir=uploads/resumes
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB